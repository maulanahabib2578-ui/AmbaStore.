<!DOCTYPE html>
<html>
<head>
  <title>AmbaStore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>AmbaStore</h2>
  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</div>

<!-- PRODUK -->
<div class="container">

  <div class="produk">
    <img src=Pena.jpg>
    <h3>Pulpen Amba</h3>
    <p>Rp15000</p>
    <button onclick="beli('Pulpen Amba', 15000)">Beli</button>
  </div>

  <div class="produk">
    <img src=Buku.jpg>
    <h3>Buku Amba</h3>
    <p>Rp25000</p>
    <button onclick="beli('Buku Amba', 8000)">Beli</button>
  </div>

  <div class="produk">
    <img src=Airberkah.jpg>
    <h3>Air Berkah Amba</h3>
    <p>Rp50000</p>
    <button onclick="beli('Air Berkah Amba', 50000)">Beli</button>
  </div>

</div>

<!-- POPUP KERANJANG -->
<div id="cart-popup" class="cart-popup">
  <div class="cart-header">
    <h3>Keranjang</h3>
    <button onclick="toggleCart()">✖</button>
  </div>

  <ul id="list-keranjang"></ul>
  <p id="total">Total: Rp0</p>
  <button id="checkout-btn" onclick="checkout()">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
